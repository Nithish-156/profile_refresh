<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naukri Profile Refresher — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.875rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    #logout-btn {
      background: #1e2130;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #logout-btn:hover { background: #2d3148; }

    .stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    @media (max-width: 480px) {
      .stat-card { min-width: calc(50% - 0.5rem); }
      h1 { font-size: 1.2rem; }
      td, th { padding: 0.6rem 0.75rem; font-size: 0.8rem; }
      .msg { max-width: 160px; }
    }

    .stat-card {
      background: #1e2130;
      border-radius: 12px;
      padding: 1.25rem 1.75rem;
      min-width: 140px;
      flex: 1;
    }

    .stat-card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
    }

    .stat-card.success .value { color: #4ade80; }
    .stat-card.failed  .value { color: #f87171; }
    .stat-card.total   .value { color: #60a5fa; }
    .stat-card.rate    .value { color: #facc15; }

    .table-wrap {
      background: #1e2130;
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #2d3148;
    }

    .table-header span { font-weight: 600; }

    #refresh-btn {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #refresh-btn:hover { background: #2563eb; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      text-align: left;
      padding: 0.75rem 1.25rem;
      color: #64748b;
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #2d3148;
    }

    tbody tr {
      border-bottom: 1px solid #1a1d2e;
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #252840; }

    td { padding: 0.75rem 1.25rem; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge.success { background: #14532d; color: #4ade80; }
    .badge.failed  { background: #450a0a; color: #f87171; }

    .msg { color: #94a3b8; max-width: 420px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    #loading, #error {
      text-align: center;
      padding: 3rem;
      color: #64748b;
    }

    #error { color: #f87171; }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>Naukri Profile Refresher</h1>
      <p class="subtitle">Monitoring dashboard — auto-reads from <code>../logs/runs.json</code></p>
    </div>
    <div class="user-info">
      <span id="welcome-msg"></span>
      <button id="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card total">
      <div class="label">Total Runs</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card success">
      <div class="label">Successful</div>
      <div class="value" id="stat-success">—</div>
    </div>
    <div class="stat-card failed">
      <div class="label">Failed</div>
      <div class="value" id="stat-failed">—</div>
    </div>
    <div class="stat-card rate">
      <div class="label">Success Rate</div>
      <div class="value" id="stat-rate">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <span>Run History</span>
      <button id="refresh-btn" onclick="loadLogs()">↻ Refresh</button>
    </div>
    <div id="loading">Loading logs...</div>
    <div id="error" style="display:none"></div>
    <table id="log-table" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Timestamp (UTC)</th>
          <th>Status</th>
          <th>Message</th>
        </tr>
      </thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>

  <script>
    // Auth guard
    const auth = JSON.parse(localStorage.getItem("nr_auth") || "null");
    if (!auth) window.location.href = "login.html";
    else document.getElementById("welcome-msg").textContent = "Hi, " + auth.username;

    function logout() {
      localStorage.removeItem("nr_auth");
      window.location.href = "login.html";
    }

    const LOG_URL = "../logs/runs.json";

    async function loadLogs() {
      const loading = document.getElementById("loading");
      const error   = document.getElementById("error");
      const table   = document.getElementById("log-table");

      loading.style.display = "block";
      error.style.display   = "none";
      table.style.display   = "none";

      try {
        const res = await fetch(LOG_URL + "?t=" + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const records = await res.json();

        // Stats
        const total   = records.length;
        const success = records.filter(r => r.status === "success").length;
        const failed  = total - success;
        const rate    = total ? Math.round((success / total) * 100) : 0;

        document.getElementById("stat-total").textContent   = total;
        document.getElementById("stat-success").textContent = success;
        document.getElementById("stat-failed").textContent  = failed;
        document.getElementById("stat-rate").textContent    = rate + "%";

        // Table — newest first
        const tbody = document.getElementById("log-body");
        tbody.innerHTML = "";
        [...records].reverse().forEach((r, i) => {
          const tr = document.createElement("tr");
          const ts = new Date(r.timestamp).toLocaleString("en-GB", { timeZone: "UTC", hour12: false });
          tr.innerHTML = `
            <td>${total - i}</td>
            <td>${ts}</td>
            <td><span class="badge ${r.status}">${r.status}</span></td>
            <td class="msg" title="${escHtml(r.message)}">${escHtml(r.message)}</td>
          `;
          tbody.appendChild(tr);
        });

        loading.style.display = "none";
        table.style.display   = "table";
      } catch (e) {
        loading.style.display = "none";
        error.style.display   = "block";
        error.textContent     = "Could not load logs: " + e.message +
          ". Make sure logs/runs.json exists and you're serving this via a web server.";
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    loadLogs();
    // Auto-refresh every 5 minutes
    setInterval(loadLogs, 5 * 60 * 1000);
  </script>
</body>
</html>
