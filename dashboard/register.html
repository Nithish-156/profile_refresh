<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Naukri Refresher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #1e2130;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo .icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    .logo p {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 0.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #3b82f6; }

    .hint {
      font-size: 0.75rem;
      color: #475569;
      margin-top: 0.3rem;
    }

    .btn {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #64748b;
    }

    .footer-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link a:hover { text-decoration: underline; }

    .error-msg {
      background: #450a0a;
      color: #f87171;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .success-msg {
      background: #14532d;
      color: #4ade80;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="icon">🔄</span>
      <h1>Create Account</h1>
      <p>Register to access the dashboard</p>
    </div>

    <div class="error-msg"   id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Choose a username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" autocomplete="new-password" required />
        <p class="hint">At least 6 characters</p>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" required />
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <div class="footer-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    document.getElementById("register-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const confirm  = document.getElementById("confirm").value;
      const errorEl  = document.getElementById("error-msg");
      const successEl = document.getElementById("success-msg");

      errorEl.style.display   = "none";
      successEl.style.display = "none";

      if (!username) {
        return showError("Username is required.");
      }
      if (password.length < 6) {
        return showError("Password must be at least 6 characters.");
      }
      if (password !== confirm) {
        return showError("Passwords do not match.");
      }

      const users = JSON.parse(localStorage.getItem("nr_users") || "[]");
      if (users.find(u => u.username === username)) {
        return showError("Username already taken. Choose another.");
      }

      users.push({ username, password: btoa(password) });
      localStorage.setItem("nr_users", JSON.stringify(users));

      successEl.textContent = "Account created! Redirecting to login...";
      successEl.style.display = "block";
      setTimeout(() => window.location.href = "login.html", 1500);

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = "block";
      }
    });
  </script>
</body>
</html>
